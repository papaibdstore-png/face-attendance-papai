<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ลงทะเบียนใบหน้า</title><script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#020617;color:white;min-height:100vh;padding:16px}.wrap{max-width:460px;margin:auto}h2{text-align:center}input,button{width:100%;padding:15px;margin:7px 0;border-radius:14px;border:0;font-size:16px}input{background:#111827;color:white;border:1px solid #334155}button{background:#2563eb;color:white;font-weight:bold}.camera{position:relative;width:100%;aspect-ratio:3/4;background:#000;border-radius:28px;overflow:hidden;margin:15px 0;border:2px solid #334155}video{width:100%;height:100%;object-fit:cover}.frame{position:absolute;inset:18%;border:4px solid #38bdf8;border-radius:38px;box-shadow:0 0 30px #38bdf8}.scanline{position:absolute;left:18%;right:18%;height:4px;background:#22c55e;box-shadow:0 0 18px #22c55e;animation:scan 1.8s linear infinite alternate}@keyframes scan{from{top:20%}to{top:78%}}.status{padding:13px;background:#111827;border-radius:14px;text-align:center;color:#cbd5e1;line-height:1.5}a{color:#93c5fd;display:block;text-align:center;margin-top:12px}</style><link rel="icon" type="image/svg+xml" href="favicon.svg">
</head><body><div class="wrap"><h2>ลงทะเบียนใบหน้าพนักงาน</h2><input id="employeeCode" placeholder="รหัสพนักงาน เช่น 001"><input id="employeeName" placeholder="ชื่อพนักงาน"><div class="camera"><video id="video" autoplay muted playsinline></video><div class="frame"></div><div class="scanline"></div></div><button onclick="registerEmployee()">บันทึกใบหน้า</button><div id="status" class="status">กำลังเปิดระบบ...</div><a href="index.html">กลับหน้าแรก</a></div><script>
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);const video=document.getElementById('video');const statusText=document.getElementById('status');window.addEventListener('load',()=>setTimeout(start,500));async function loadModels(){const MODEL_URL='https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);}async function start(){try{statusText.innerText='กำลังโหลดระบบตรวจใบหน้า...';await loadModels();statusText.innerText='กำลังเปิดกล้อง...';const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});video.srcObject=stream;statusText.innerText='พร้อมลงทะเบียน กรุณาให้ใบหน้าอยู่ในกรอบ';}catch(err){statusText.innerText='เปิดระบบไม่ได้: '+err.message;}}async function registerEmployee(){const employee_code=document.getElementById('employeeCode').value.trim();const name=document.getElementById('employeeName').value.trim();if(!employee_code||!name){alert('กรอกรหัสพนักงานและชื่อก่อน');return;}statusText.innerText='กำลังสแกนใบหน้า...';const detection=await faceapi.detectSingleFace(video,new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:.5})).withFaceLandmarks().withFaceDescriptor();if(!detection){statusText.innerText='ไม่พบใบหน้า กรุณาหันหน้าตรงและเพิ่มแสง';return;}const face_data=Array.from(detection.descriptor);statusText.innerText='กำลังบันทึกข้อมูลพนักงาน...';const {error}=await db.from('employees').insert({employee_code,name,face_data});if(error){statusText.innerText='บันทึกไม่สำเร็จ: '+error.message;return;}statusText.innerHTML='✅ ลงทะเบียนสำเร็จ<br>รหัส: '+employee_code+'<br>ชื่อ: '+name;}
</script></body></html>
