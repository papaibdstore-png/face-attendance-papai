<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เครื่องสแกนหน้าเข้า-ออกงาน</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:#f4f7fb;
  color:#0f172a;
  min-height:100vh;
  overflow:hidden;
}

.wrap{
  width:100%;
  height:100vh;
  padding:10px 14px;
}

.top{
  height:54px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  margin-bottom:8px;
}

.top h1,
.top h2{
  grid-column:2;
  margin:0;
  text-align:center;
  font-size:24px;
  line-height:1.15;
  color:#0f172a;
  white-space:nowrap;
}

.clock{
  grid-column:3;
  justify-self:end;
  color:#1d4ed8;
  font-size:32px;
  font-weight:800;
}

.main-layout{
  display:grid;
  grid-template-columns:52% 48%;
  gap:12px;
  height:calc(100vh - 72px);
}

.left-panel{
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:0;
}

.scanner{
  position:relative;
  width:100%;
  max-width:620px;
  max-height:100%;
  aspect-ratio:4/3;
  background:#000;
  border-radius:22px;
  overflow:hidden;
  border:3px solid #dbeafe;
  box-shadow:0 12px 34px rgba(15,23,42,.16);
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

.face-frame{
  position:absolute;
  left:23%;
  right:23%;
  top:18%;
  bottom:18%;
  border:4px solid #22c55e;
  border-radius:34px;
  box-shadow:0 0 22px rgba(34,197,94,.85),inset 0 0 12px rgba(34,197,94,.22);
}

.scan-line{
  position:absolute;
  left:20%;
  right:20%;
  height:4px;
  background:#38bdf8;
  box-shadow:0 0 18px #38bdf8;
  animation:scan 1.45s linear infinite alternate;
}

@keyframes scan{
  from{top:22%}
  to{top:72%}
}

.right-panel{
  background:#ffffff;
  border:2px solid #dbeafe;
  border-radius:22px;
  padding:14px;
  display:flex;
  flex-direction:column;
  min-width:0;
  box-shadow:0 8px 28px rgba(15,23,42,.08);
}

.big-status{
  padding:14px 16px;
  border-radius:18px;
  background:#dcfce7;
  color:#166534;
  text-align:center;
  font-size:30px;
  font-weight:800;
  margin-bottom:10px;
  min-height:64px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.big-status.warning{
  background:#fee2e2;
  color:#b91c1c;
}

.big-status.ot{
  background:#dbeafe;
  color:#1d4ed8;
}

.status{
  display:none;
}

.card{
  display:block;
  flex:1;
  margin:0;
  padding:18px;
  border-radius:18px;
  background:#ffffff;
  border:2px solid #dbeafe;
  line-height:1.55;
  font-size:22px;
  overflow:auto;
  box-shadow:0 4px 14px rgba(15,23,42,.04);
}

.card b{
  color:#1d4ed8;
}

.card b[style]{
  font-size:inherit !important;
}

.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:#eff6ff;
  color:#1d4ed8;
  margin-top:6px;
  font-size:18px;
  font-weight:800;
}

.buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

button{
  padding:18px;
  border:0;
  border-radius:18px;
  color:white;
  font-size:24px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 4px 12px rgba(15,23,42,.12);
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.confirm{
  background:#22c55e;
}

.cancel{
  background:#ef4444;
}

.pause{
  background:#0ea5e9;
  width:100%;
  margin-top:10px;
  padding:18px;
}

.right-panel h2{
  font-size:22px !important;
  margin-top:12px !important;
  margin-bottom:2px !important;
}

.small-note{
  font-size:14px;
  color:#64748b;
  text-align:center;
  margin-top:8px;
  line-height:1.5;
}

a{
  display:block;
  text-align:center;
  color:#2563eb;
  margin-top:6px;
  font-size:14px;
}

.kiosk-btn{
  position:fixed;
  right:12px;
  bottom:12px;
  z-index:9999;
  width:auto;
  padding:9px 14px;
  border-radius:999px;
  background:#0f172a;
  color:white;
  font-size:14px;
  box-shadow:0 8px 20px rgba(15,23,42,.22);
}

@media(max-width:1200px){
  .wrap{padding:8px}
  .top{height:48px}
  .top h1,.top h2{font-size:20px}
  .clock{font-size:28px}
  .main-layout{
    grid-template-columns:50% 50%;
    gap:8px;
    height:calc(100vh - 58px);
  }
  .scanner{
    max-width:520px;
    border-radius:18px;
  }
  .right-panel{
    padding:10px;
    border-radius:18px;
  }
  .big-status{
    font-size:24px;
    min-height:54px;
    padding:10px;
  }
  .card{
    font-size:19px;
    padding:14px;
  }
  .badge{
    font-size:16px;
  }
  button{
    font-size:21px;
    padding:15px;
    border-radius:15px;
  }
}

@media(max-width:760px){
  body{overflow:auto}
  .wrap{height:auto;padding:8px}
  .top{
    height:auto;
    display:block;
    text-align:center;
  }
  .top h1,.top h2{
    white-space:normal;
    font-size:20px;
  }
  .clock{
    font-size:28px;
    margin-top:4px;
  }
  .main-layout{
    display:block;
    height:auto;
  }
  .scanner{
    width:100%;
    max-width:100%;
    aspect-ratio:4/3;
    margin-bottom:8px;
  }
  .right-panel{
    min-height:auto;
  }
  .big-status{
    font-size:24px;
    min-height:52px;
  }
  .card{
    font-size:18px;
    min-height:180px;
  }
  button{
    font-size:20px;
    padding:14px;
  }
}

.refresh-btn{
  background:#ff0088;
  width:100%;
  margin-top:10px;
  padding:14px;
  font-size:20px;
}
.keepawake-note{
  text-align:center;
  color:#64748b;
  font-size:13px;
  line-height:1.4;
  margin-top:8px;
}

</style>

</head>

<body>
<div class="wrap">
  <div class="top">
    <div class="center"></div>
    <h1>เครื่องสแกนหน้าเข้า-ออกงานร้านป่าไผ่วัสดุก่อสร้าง</h1>
    <div id="clock" class="clock">--:--:--</div>
  </div>

  <div class="main-layout">
    <div class="left-panel">
      <div class="scanner">
        <video id="video" autoplay muted playsinline></video>
        <div class="face-frame"></div>
        <div class="scan-line"></div>
      </div>
    </div>

    <div class="right-panel">
      <div id="bigStatus" class="big-status">พร้อมสแกน</div>

      <div id="status" class="status">กำลังเปิดระบบ...</div>

      <div id="previewCard" class="card">
        กรุณายืนหน้ากล้อง
      </div>

      <div id="confirmButtons" class="buttons" style="display:none">
        <button id="confirmBtn" class="confirm" onclick="confirmAttendance()">✅ ยืนยัน</button>
        <button class="cancel" onclick="cancelPreview()">❌ ยกเลิก</button>
      </div>

      <button id="pauseBtn" class="pause" onclick="manualScan()">เริ่มสแกน</button>
<button class="refresh-btn" onclick="refreshScannerPage()">🔄 รีเฟรชเครื่องสแกน</button>
<div id="wakeLockStatus" class="keepawake-note">โหมดเปิดจอค้าง: กำลังตรวจสอบ...</div>

      <h2 style="margin-top:22px;color:#1d4ed8;text-align:center"> 
        🙏ขอบคุณครับ🙏<br>
      </h2>

      <a href="index.html">กลับหน้าแรก</a>
    </div>
  </div>
</div>

<button id="kioskBtn" class="kiosk-btn" onclick="openKioskMode()">⛶ เต็มจอ</button>





<script>
  
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const WORK_RULES = {
  morningCutoff: '10:20',
  lunchStart: '10:20',
  lunchEnd: '14:00',
  earlyLeaveBefore: '16:45',
  overtimeAfter: '17:15'
};

const FACE_PASS_THRESHOLD = 0.42;
const SAME_PERSON_COOLDOWN_SECONDS = 3;
const AUTO_SCAN_INTERVAL_MS = 2500;

const video = document.getElementById('video');
const statusText = document.getElementById('status');
const previewCard = document.getElementById('previewCard');
const confirmButtons = document.getElementById('confirmButtons');
const pauseBtn = document.getElementById('pauseBtn');
const bigStatus = document.getElementById('bigStatus');

let employees = [];
let pendingRecord = null;
let isAutoScanEnabled = false;
let isScanning = false;
let autoScanTimer = null;
let lastSaved = {
  employee_id: null,
  time: 0
};

window.addEventListener('load', () => {

  speechSynthesis.getVoices();
  requestWakeLock();

  setTimeout(start, 500);

});

setInterval(updateClock, 1000);
updateClock();


function refreshScannerPage(){
  window.location.reload();
}

let wakeLock = null;

async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
      const el = document.getElementById('wakeLockStatus');
      if(el) el.innerText = 'โหมดเปิดจอค้าง: เปิดแล้ว';
      wakeLock.addEventListener('release', () => {
        const el = document.getElementById('wakeLockStatus');
        if(el) el.innerText = 'โหมดเปิดจอค้าง: ถูกปิดชั่วคราว';
      });
    }else{
      const el = document.getElementById('wakeLockStatus');
      if(el) el.innerText = 'โหมดเปิดจอค้าง: เครื่องนี้อาจไม่รองรับ';
    }
  }catch(err){
    const el = document.getElementById('wakeLockStatus');
    if(el) el.innerText = 'โหมดเปิดจอค้าง: ต้องกดหน้าจอ 1 ครั้ง';
  }
}

document.addEventListener('visibilitychange', async () => {
  if(document.visibilityState === 'visible'){
    await requestWakeLock();
  }
});

document.addEventListener('click', async () => {
  await requestWakeLock();
}, { once:false });

function updateClock(){
  document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH');
}

function speakThai(text){

  if(!window.speechSynthesis) return;

  window.speechSynthesis.cancel();

  const msg = new SpeechSynthesisUtterance(text);

  msg.lang = 'th-TH';

  // พูดช้าลง ฟังธรรมชาติขึ้น
  msg.rate = 0.9;

  // น้ำเสียงต่ำลงนิด
  msg.pitch = 1;

  msg.volume = 1;

  const voices = speechSynthesis.getVoices();

  // เลือกเสียงไทยที่ดีที่สุด
  const thaiVoice =
    voices.find(v => v.name.includes('Kanya')) ||
    voices.find(v => v.name.includes('ไทย')) ||
    voices.find(v => v.lang.includes('th'));

  if(thaiVoice){
    msg.voice = thaiVoice;
  }

  // เว้นจังหวะก่อนพูด
  setTimeout(() => {
    speechSynthesis.speak(msg);
  }, 50);
}


function setBigStatus(text, type='normal'){
  bigStatus.className = 'big-status';
  if(type === 'warning') bigStatus.classList.add('warning');
  if(type === 'ot') bigStatus.classList.add('ot');
  bigStatus.innerText = text;
}

function openKioskMode(){
  const el = document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();

  const btn = document.getElementById('kioskBtn');
  if(btn) btn.style.display = 'none';
}

function playSuccessSound(){
  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();

    function beep(freq, start, duration){
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + duration + 0.03);
    }

    beep(880, 0, 0.12);
    beep(1175, 0.14, 0.16);
  }catch(e){}
}

function playWarningSound(){
  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = 220;
    gain.gain.value = 0.12;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.18);
  }catch(e){}
}

async function loadModels(){
  const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
  await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
  await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
  await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
}

async function start(){
  try{
    statusText.innerText = 'กำลังโหลดระบบตรวจใบหน้า...';
    setBigStatus('กำลังโหลด...');

    await loadModels();

    statusText.innerText = 'กำลังเปิดกล้อง...';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user' },
      audio: false
    });
    video.srcObject = stream;

    await loadEmployees();

    statusText.innerText = 'พร้อมใช้งาน กดปุ่ม “เริ่มสแกน”';
    setBigStatus('พร้อมสแกน');
    previewCard.innerHTML = 'กดปุ่ม “เริ่มสแกน” แล้วให้ใบหน้าอยู่ในกรอบสีเขียว';

  }catch(err){
    statusText.innerText = 'เปิดระบบไม่ได้: ' + err.message;
    setBigStatus('เปิดระบบไม่ได้', 'warning');
    previewCard.innerHTML = err.message;
  }
}

async function loadEmployees(){
  statusText.innerText = 'กำลังโหลดข้อมูลพนักงาน...';

  const { data, error } = await db
    .from('employees')
    .select('id, employee_code, name, face_data, lunch_break_minutes')
    .eq('is_active', true);

  if(error){
    statusText.innerText = 'โหลดพนักงานไม่สำเร็จ: ' + error.message;
    setBigStatus('โหลดข้อมูลไม่ได้', 'warning');
    return;
  }

  employees = (data || []).map(emp => ({
    id: emp.id,
    employee_code: emp.employee_code,
    name: emp.name,
    descriptor: new Float32Array(emp.face_data),
    lunch_break_minutes: emp.lunch_break_minutes || 60
  }));
}

function startAutoScanLoop(){
  // ปิดระบบสแกนอัตโนมัติ ใช้กดปุ่ม manualScan() แทน
}

async function manualScan(){
  if(isScanning) return;

  if(pendingRecord){
    statusText.innerText = 'มีรายการรอยืนยัน กรุณายืนยันหรือยกเลิกก่อน';
    setBigStatus('รอยืนยัน', 'warning');
    return;
  }

  pauseBtn.disabled = true;
  pauseBtn.innerText = 'กำลังสแกน...';
  setBigStatus('กำลังสแกน...');
  statusText.innerText = 'กำลังสแกนใบหน้า...';

  await autoScanFace();

  if(!pendingRecord){
    pauseBtn.disabled = false;
    pauseBtn.innerText = 'เริ่มสแกน';
  }
}

function toggleAutoScan(){
  // ไม่ใช้งานแล้ว
}

async function autoScanFace(){
  if(employees.length === 0){
    statusText.innerText = 'ยังไม่มีข้อมูลพนักงาน กรุณาลงทะเบียนก่อน';
    setBigStatus('ไม่มีข้อมูลพนักงาน', 'warning');
    previewCard.innerHTML = 'กรุณาลงทะเบียนใบหน้าก่อน';
    pauseBtn.disabled = false;
    pauseBtn.innerText = 'เริ่มสแกน';
    return;
  }

  isScanning = true;

  try{
    statusText.innerText = 'กำลังสแกนใบหน้า...';

    const detection = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 }))
      .withFaceLandmarks()
      .withFaceDescriptor();

    if(!detection){
      statusText.innerText = 'รอพนักงานยืนหน้ากล้อง...';
      isScanning = false;
      pauseBtn.disabled = false;
      pauseBtn.innerText = 'เริ่มสแกน';
      return;
    }

    let bestMatch = null;
    let bestDistance = 999;

    employees.forEach(emp => {
      const distance = faceapi.euclideanDistance(detection.descriptor, emp.descriptor);
      if(distance < bestDistance){
        bestDistance = distance;
        bestMatch = emp;
      }
    });

    if(!bestMatch || bestDistance > FACE_PASS_THRESHOLD){
      statusText.innerText = 'พบใบหน้า แต่ไม่ตรงกับพนักงานในระบบ';
      setBigStatus('ไม่พบข้อมูล', 'warning');
      playWarningSound();
      previewCard.style.display = 'block';
      previewCard.innerHTML =
        '<b>ไม่พบข้อมูลพนักงาน</b><br>' +
        'ค่าความต่างใบหน้า: ' + bestDistance.toFixed(3) + '<br>' +
        'ค่าที่ระบบอนุญาต: ไม่เกิน ' + FACE_PASS_THRESHOLD;
      isScanning = false;
      pauseBtn.disabled = false;
      pauseBtn.innerText = 'เริ่มสแกน';
      return;
    }

    const now = Date.now();
    if(
  lastSaved.employee_id === bestMatch.id &&
  (now - lastSaved.time) < SAME_PERSON_COOLDOWN_SECONDS * 1000
){

  statusText.innerText = 'สถานะนี้สแกนไปแล้ว แต่ยังบันทึกซ้ำได้';

  setBigStatus('สแกนซ้ำ', 'warning');

  playWarningSound();

  speakThai(
    bestMatch.name +
    ' สถานะนี้สแกนสำเร็จแล้ว แต่ยังสามารถบันทึกได้ครับ'
  );

}

    const scanTime = new Date();
    const rule = await calculateAutoAttendanceStatus(scanTime, bestMatch);

    const duplicateLog = await checkDuplicateStatusToday(bestMatch.id, rule.scan_type, scanTime);
    const isDuplicateStatus = !!duplicateLog;

    if(isDuplicateStatus){
      const oldTime = new Date(duplicateLog.scan_time).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
      statusText.innerText = 'สถานะนี้เคยสแกนแล้ว วันนี้เวลา ' + oldTime + ' แต่ยังบันทึกซ้ำได้';
      setBigStatus('⚠️ สแกนสถานะซ้ำ', 'warning');
      playWarningSound();
      speakThai(bestMatch.name + ' สถานะ ' + rule.scan_type + ' เคยสแกนแล้ว');
      rule.note = 'สแกนซ้ำ: วันนี้เคยบันทึก ' + rule.scan_type + ' เวลา ' + oldTime + ' | ' + rule.note;
    }

    const imageBase64 = captureImage();

    pendingRecord = {
      employee_id: bestMatch.id,
      employee_code: bestMatch.employee_code,
      employee_name: bestMatch.name,
      scan_type: rule.scan_type,
      scan_time: scanTime.toISOString(),
      status_text: rule.status_text,
      late_minutes: rule.late_minutes,
      early_leave_minutes: rule.early_leave_minutes,
      overtime_minutes: rule.overtime_minutes,
      note: rule.note,
      lat: null,
      lng: null,
      image_base64: imageBase64,
      face_score: bestDistance,
      is_duplicate_status: isDuplicateStatus
    };

    isAutoScanEnabled = false;
    pauseBtn.innerText = 'กำลังรอยืนยัน';

    statusText.innerText = 'พบพนักงาน กรุณาตรวจสอบและกดยืนยัน';

    previewCard.style.display = 'block';

    if(isDuplicateStatus){
      setBigStatus('⚠️ สแกนสถานะซ้ำ', 'warning');
    }else if(rule.status_text.includes('สาย') || rule.status_text.includes('พักเกิน') || rule.status_text.includes('ออกก่อน') || rule.status_text.includes('สแกนพักเที่ยงซ้ำ')){
      setBigStatus('⚠️ ' + rule.status_text, 'warning');
    }else if(rule.status_text.includes('OT')){
      setBigStatus('🕒 ' + rule.status_text, 'ot');
    }else{
      setBigStatus('✅ ปกติ');
    }

    previewCard.innerHTML =
      '<b style="font-size:26px">' + bestMatch.name + ' (' + bestMatch.employee_code + ')</b><br>' +
      '<b style="font-size:34px">' + scanTime.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}) + ' น.</b><br>' +
      '<b style="font-size:28px">' + rule.scan_type + '</b><br>' +
      '<span class="badge">' + rule.status_text + '</span><br>' +
      (isDuplicateStatus ? '<span class="badge" style="background:#fee2e2;color:#b91c1c">สถานะนี้เคยสแกนแล้ว</span><br>' : '') +
      '<br>หมายเหตุ: ' + rule.note + '<br><br>' +
      '<b>กดปุ่ม “ยืนยัน” เพื่อบันทึก</b>';

    confirmButtons.style.display = 'grid';
    pauseBtn.disabled = true;
    pauseBtn.innerText = 'รอยืนยัน';

  }catch(err){
    statusText.innerText = 'สแกนไม่สำเร็จ: ' + err.message;
    setBigStatus('สแกนไม่สำเร็จ', 'warning');
    pauseBtn.disabled = false;
    pauseBtn.innerText = 'เริ่มสแกน';
  }

  isScanning = false;
}

async function confirmAttendance(){
  if(!pendingRecord){
    statusText.innerText = 'ยังไม่มีข้อมูลที่รอยืนยัน';
    return;
  }

  const confirmBtn = document.getElementById('confirmBtn');
  confirmBtn.disabled = true;
  confirmBtn.innerText = 'กำลังบันทึก...';
  confirmBtn.style.opacity = '0.5';

  statusText.innerText = 'กำลังบันทึก...';
  setBigStatus('กำลังบันทึก...');

  const lat = null;
  const lng = null;

  const insertData = {
    employee_id: pendingRecord.employee_id,
    employee_code: pendingRecord.employee_code,
    employee_name: pendingRecord.employee_name,
    scan_type: pendingRecord.scan_type,
    scan_time: pendingRecord.scan_time,
    status_text: pendingRecord.status_text,
    late_minutes: pendingRecord.late_minutes,
    early_leave_minutes: pendingRecord.early_leave_minutes,
    overtime_minutes: pendingRecord.overtime_minutes,
    note: pendingRecord.note,
    lat,
    lng
  };

  const { data, error } = await db
    .from('attendance_logs')
    .insert(insertData)
    .select()
    .single();

  if(error){
    statusText.innerText = 'บันทึกไม่สำเร็จ: ' + error.message;
    setBigStatus('บันทึกไม่สำเร็จ', 'warning');
    confirmBtn.disabled = false;
    confirmBtn.innerText = '✅ ยืนยัน';
    confirmBtn.style.opacity = '1';
    pauseBtn.disabled = false;
    pauseBtn.innerText = 'เริ่มสแกน';
    return;
  }

  statusText.innerText = 'บันทึกแล้ว กำลังส่ง Telegram...';

  const telegramResult = await sendTelegram(data, pendingRecord.image_base64);

  lastSaved.employee_id = pendingRecord.employee_id;
  lastSaved.time = Date.now();

  statusText.innerText = '✅ บันทึกสำเร็จ';
  setBigStatus('✅ บันทึกสำเร็จ');
  playSuccessSound();

  setTimeout(() => {
  speakThai('คุณ ...' + data.employee_name + '... บันทึกสำเร็จครับ');}, 300);

  previewCard.innerHTML =
    data.employee_name + ' (' + data.employee_code + ')<br>' +
    new Date(data.scan_time).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}) + ' น.<br>' +
    data.scan_type + ' ✅';

  if(telegramResult && telegramResult.success){
    previewCard.innerHTML += '<br><br>🙏🙏บันทึกข้อมูลสำเร็จครับ กำลังรีเฟรชหน้าใหม่🙏🙏';
  }else{
    previewCard.innerHTML += '⚠️⚠️บันทึกข้อมูลไม่สำเร็จครับ⚠️⚠️';
  }

  pendingRecord = null;
  confirmButtons.style.display = 'none';
  confirmBtn.disabled = false;
  confirmBtn.innerText = '✅ ยืนยัน';
  confirmBtn.style.opacity = '1';

  setTimeout(() => {
    window.location.reload();
  }, 1800);
}

function cancelPreview(){
  resetPreview();
  isAutoScanEnabled = true;
  pauseBtn.innerText = 'เริ่มสแกน';
  statusText.innerText = 'ยกเลิกแล้ว กดปุ่ม “เริ่มสแกน” ใหม่';
  setBigStatus('พร้อมสแกน');
}

function resetPreview(){
  pendingRecord = null;
  previewCard.style.display = 'block';
  previewCard.innerHTML = 'กดปุ่ม “เริ่มสแกน” แล้วให้ใบหน้าอยู่ในกรอบสีเขียว';
  confirmButtons.style.display = 'none';

  const confirmBtn = document.getElementById('confirmBtn');
  if(confirmBtn){
    confirmBtn.disabled = false;
    confirmBtn.innerText = '✅ ยืนยัน';
    confirmBtn.style.opacity = '1';
  }

  pauseBtn.disabled = false;
  pauseBtn.innerText = 'เริ่มสแกน';
  setBigStatus('พร้อมสแกน');
}

async function sendTelegram(record, imageBase64){
  try{
    const functionUrl = SUPABASE_URL + '/functions/v1/send-telegram';

    const res = await fetch(functionUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
      },
      body: JSON.stringify({
        record,
        imageBase64
      })
    });

    return await res.json();
  }catch(err){
    statusText.innerText = 'บันทึกแล้ว แต่ส่ง Telegram ไม่สำเร็จ: ' + err.message;
    return null;
  }
}


async function checkDuplicateStatusToday(employeeId, scanType, scanTime){
  const start = new Date(scanTime);
  start.setHours(0,0,0,0);

  const end = new Date(scanTime);
  end.setHours(23,59,59,999);

  const { data, error } = await db
    .from('attendance_logs')
    .select('id, scan_type, scan_time')
    .eq('employee_id', employeeId)
    .eq('scan_type', scanType)
    .gte('scan_time', start.toISOString())
    .lte('scan_time', end.toISOString())
    .order('scan_time', { ascending:false })
    .limit(1);

  if(error || !data) return null;
  return data.length ? data[0] : null;
}

async function calculateAutoAttendanceStatus(date, emp){
  const nowMin = date.getHours() * 60 + date.getMinutes();

  const morningCutoff = toMin(WORK_RULES.morningCutoff);
  const lunchStart = toMin(WORK_RULES.lunchStart);
  const lunchEnd = toMin(WORK_RULES.lunchEnd);
  const earlyLeaveBefore = toMin(WORK_RULES.earlyLeaveBefore);
  const overtimeAfter = toMin(WORK_RULES.overtimeAfter);

  if(nowMin < morningCutoff){
    const normalEnd = toMin('08:00');

    if(nowMin <= normalEnd){
      return makeRule('เข้างาน', 'ปกติ', 0, 0, 0, 'ระบบตัดเป็นเข้างานอัตโนมัติ');
    }

    const late = nowMin - normalEnd;
    return makeRule('เข้างาน', 'สาย ' + late + ' นาที', late, 0, 0, 'เข้างานหลังเวลา 08:00 น.');
  }

  if(nowMin >= lunchStart && nowMin <= lunchEnd){
    const lunchState = await getLunchStateToday(emp.id, date);

    // ครั้งแรกของวัน: ออกพักเที่ยง
    if(!lunchState.hasLunchOut){
      return makeRule(
        'ออกพักเที่ยง',
        'ปกติ',
        0,
        0,
        0,
        'ระบบตัดเป็นออกพักเที่ยงอัตโนมัติ'
      );
    }

    // มีการออกพักแล้ว แต่ยังไม่มีการกลับเข้าหลังรายการออกพักล่าสุด
    if(!lunchState.hasLunchIn){
      const lunchOutTime = new Date(lunchState.lastLunchOut.scan_time);
      const lunchUsed = Math.round((date.getTime() - lunchOutTime.getTime()) / 60000);
      const allowed = emp.lunch_break_minutes || 60;

      if(lunchUsed <= allowed){
        return makeRule(
          'กลับจากพักเที่ยง',
          'ปกติ',
          0,
          0,
          0,
          'ใช้เวลาพัก ' + lunchUsed + ' นาที จากสิทธิ์ ' + allowed + ' นาที'
        );
      }

      const lateLunch = lunchUsed - allowed;
      return makeRule(
        'กลับจากพักเที่ยง',
        'พักเกิน ' + lateLunch + ' นาที',
        lateLunch,
        0,
        0,
        'ใช้เวลาพัก ' + lunchUsed + ' นาที เกินสิทธิ์ ' + allowed + ' นาที'
      );
    }

    // วันนี้สแกนออกพักและกลับจากพักครบแล้ว
    // ให้ทุกครั้งถัดไปเป็นสถานะซ้ำ เพื่อแจ้งเตือนชัดเจน ไม่วนกลับไปเป็นออกพักเที่ยงใหม่
    return makeRule(
      'กลับจากพักเที่ยง',
      'สแกนพักเที่ยงซ้ำ',
      0,
      0,
      0,
      'วันนี้สแกนออกพักเที่ยงและกลับจากพักเที่ยงครบแล้ว กรุณาตรวจสอบก่อนยืนยัน'
    );
  }

  if(nowMin > lunchEnd){
    if(nowMin < earlyLeaveBefore){
      const early = earlyLeaveBefore - nowMin+15;
      return makeRule(
        'ออกงานเย็น',
        'ออกก่อน ' + early + ' นาที',
        0,
        early,
        0,
        'ออกก่อนเวลา 16:45 น.'
      );
    }

if(nowMin > overtimeAfter){

  // เริ่มนับ OT ตั้งแต่ 17:00
  const ot = nowMin - toMin('17:00');

  return makeRule(
    'ออกงานเย็น',
    'OT ' + ot + ' นาที',
    0,
    0,
    ot,
    'ออกงานหลังเวลา 17:15 น. แต่เริ่มคิด OT ตั้งแต่ 17:00 น.'
  );
}
    return makeRule('ออกงานเย็น', 'ปกติ', 0, 0, 0, 'ระบบตัดเป็นออกงานอัตโนมัติ');
  }

  return makeRule('ไม่ทราบประเภท', 'นอกช่วงเวลา', 0, 0, 0, 'ไม่พบกติกาสำหรับเวลานี้');
}

async function getLunchStateToday(employeeId, nowDate){
  const start = new Date(nowDate);
  start.setHours(0,0,0,0);

  const end = new Date(nowDate);
  end.setHours(23,59,59,999);

  const { data, error } = await db
    .from('attendance_logs')
    .select('id, scan_type, scan_time')
    .eq('employee_id', employeeId)
    .in('scan_type', ['ออกพักเที่ยง', 'กลับจากพักเที่ยง'])
    .gte('scan_time', start.toISOString())
    .lte('scan_time', end.toISOString())
    .order('scan_time', { ascending: true });

  if(error || !data){
    return {
      hasLunchOut: false,
      hasLunchIn: false,
      lastLunchOut: null
    };
  }

  const lunchOuts = data.filter(x => x.scan_type === 'ออกพักเที่ยง');
  const lunchIns = data.filter(x => x.scan_type === 'กลับจากพักเที่ยง');

  return {
    hasLunchOut: lunchOuts.length > 0,
    hasLunchIn: lunchIns.length > 0 && lunchIns[lunchIns.length - 1].scan_time > lunchOuts[lunchOuts.length - 1]?.scan_time,
    lastLunchOut: lunchOuts.length ? lunchOuts[lunchOuts.length - 1] : null
  };
}

function makeRule(scan_type, status_text, late_minutes, early_leave_minutes, overtime_minutes, note){
  return {
    scan_type,
    status_text,
    late_minutes,
    early_leave_minutes,
    overtime_minutes,
    note
  };
}

function toMin(t){
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function captureImage(){
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.55);
}
